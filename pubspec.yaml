name: news
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=2.16.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^4.0.4
  url_launcher: ^6.0.20
  provider: ^6.0.2
  carousel_slider: ^4.0.0
  timeago: ^3.1.0
  cached_network_image: ^3.2.0
  connectivity_plus: ^2.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  flutter_launcher_icons: ^0.9.2

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/translations/
    - assets/img/
    - assets/logos/
